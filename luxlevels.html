<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lux Levels Reference - OMNI</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .ref-table tr:hover { background: var(--bg-info); }
        .search-box { width: 100%; padding: 12px 16px; border: 2px solid var(--accent); font-size: 1.1em; margin-bottom: 16px; box-sizing: border-box; background: var(--bg-input); color: var(--text-primary); }
        .search-box:focus { outline: none; border-color: var(--accent-hover); box-shadow: 0 0 8px rgba(25,118,210,0.3); }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 0.8em; font-weight: bold; }
        .badge-1680 { background: var(--bg-info); color: var(--accent); }
        .badge-ncc { background: var(--bg-pass); color: #16a34a; }
        .count-label { font-size: 0.9em; color: var(--text-secondary); margin-bottom: 8px; }
        @media print { .top-tabs, .search-box { display: none !important; } }
  </style>
</head>
<body>
  <div class="top-tabs"></div>

  <div class="main-content">
    <h1>Illuminance Levels Reference</h1>
    <p>Maintained illuminance (lux) requirements by space type per <strong>AS/NZS 1680.1</strong>, <strong>AS/NZS 1680.2</strong> series, and <strong>NCC Section J6</strong>. Use the search to filter.</p>

    <div class="calc-section">
      <input type="text" class="search-box" id="searchBox" placeholder="Search by space type, building, or task (e.g. 'office', 'hospital', 'corridor')&#8230;" oninput="filterTable()" />
      <div class="input-row">
        <div class="input-group">
          <label for="filterCat">Filter by Category</label>
          <select id="filterCat" onchange="filterTable()">
            <option value="">All Categories</option>
            <option value="Office">Office</option>
            <option value="Retail">Retail</option>
            <option value="Industrial">Industrial</option>
            <option value="Healthcare">Healthcare</option>
            <option value="Education">Education</option>
            <option value="Residential">Residential</option>
            <option value="Circulation">Circulation</option>
            <option value="Outdoor">Outdoor</option>
            <option value="Car Park">Car Park</option>
            <option value="Hospitality">Hospitality</option>
          </select>
        </div>
        <div class="input-group">
          <label>&nbsp;</label>
          <div class="count-label" id="countLabel">Showing all entries</div>
          <button class="btn-export" onclick="exportLuxTable()">Export Filtered CSV</button>
        </div>
      </div>
      <table class="ref-table" id="luxTable">
        <thead>
          <tr>
            <th>Category</th>
            <th>Space / Task</th>
            <th>Maintained Illuminance (lux)</th>
            <th>UGR Limit</th>
            <th>Standard Reference</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="luxBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const luxData = [
      // Office
      ['Office','General office work','320','19','AS/NZS 1680.2.2 Table 3.2','Desks, open plan'],
      ['Office','Detailed drafting / CAD','400&ndash;500','16','AS/NZS 1680.2.2 Table 3.2','Task lighting may supplement'],
      ['Office','Executive office','320','19','AS/NZS 1680.2.2',''],
      ['Office','Meeting / conference room','240&ndash;320','19','AS/NZS 1680.2.2','Dimmable recommended'],
      ['Office','Reception / lobby','160&ndash;240','22','AS/NZS 1680.1 Table 3.1',''],
      ['Office','Filing / storage room','160','22','AS/NZS 1680.2.2',''],
      ['Office','Server room','200','22','AS/NZS 1680.2.2','Avoid glare on screens'],

      // Retail
      ['Retail','General sales area','320&ndash;500','22','AS/NZS 1680.2.2','Higher for fashion/jewellery'],
      ['Retail','Supermarket','500','19','AS/NZS 1680.2.2','Vertical illuminance important'],
      ['Retail','Checkout / POS','500','19','AS/NZS 1680.2.2','Task lighting'],
      ['Retail','Shopping mall circulation','160&ndash;240','22','AS/NZS 1680.1',''],
      ['Retail','Stockroom','160','25','AS/NZS 1680.2.2',''],

      // Industrial
      ['Industrial','General manufacturing','320','22','AS/NZS 1680.2.4',''],
      ['Industrial','Fine assembly / inspection','500&ndash;750','16','AS/NZS 1680.2.4 Table 4','Task lighting essential'],
      ['Industrial','Warehouse &mdash; general','160','25','AS/NZS 1680.2.4',''],
      ['Industrial','Warehouse &mdash; picking areas','240','22','AS/NZS 1680.2.4','Vertical illuminance on racking'],
      ['Industrial','Loading dock','100&ndash;160','25','AS/NZS 1680.2.4',''],
      ['Industrial','Workshop &mdash; general','240&ndash;320','22','AS/NZS 1680.2.4',''],
      ['Industrial','Laboratory','400&ndash;500','16','AS/NZS 1680.2.4','Colour rendering Ra &#8805;90'],
      ['Industrial','Control room','200&ndash;300','16','AS/NZS 1680.2.4','Low glare critical for screen viewing'],

      // Healthcare
      ['Healthcare','Hospital ward &mdash; general','100&ndash;200','19','AS/NZS 1680.2.5','Bedhead reading: 300 lux'],
      ['Healthcare','Examination room','500','16','AS/NZS 1680.2.5','Colour rendering Ra &#8805;90'],
      ['Healthcare','Operating theatre','1000&ndash;2000','&mdash;','AS/NZS 1680.2.5','Luminaire CRI &#8805;90; task typically 10,000+ lux'],
      ['Healthcare','Nurses station','320','19','AS/NZS 1680.2.5',''],

      ['Healthcare','Waiting room','200','22','AS/NZS 1680.2.5',''],
      ['Healthcare','Pathology / lab','500','16','AS/NZS 1680.2.5',''],
      ['Healthcare','Aged care &mdash; common area','200&ndash;300','19','AS/NZS 1680.2.5','Higher levels for elderly eyes'],

      // Education
      ['Education','Classroom &mdash; general','320','19','AS/NZS 1680.2.1 Table 2',''],
      ['Education','Lecture theatre','320','19','AS/NZS 1680.2.1','Dimmable for AV presentations'],
      ['Education','Art room / workshop','400&ndash;500','16','AS/NZS 1680.2.1','Ra &#8805;90'],
      ['Education','Library &mdash; reading area','320','19','AS/NZS 1680.2.1',''],
      ['Education','Library &mdash; stack area','160&ndash;200','22','AS/NZS 1680.2.1','Vertical illuminance on spines'],
      ['Education','Administration office','320','19','AS/NZS 1680.2.2',''],
      ['Education','Assembly hall','200','22','AS/NZS 1680.2.1','Dimmable for events'],
      ['Education','Sports hall','300&ndash;500','22','AS 2560 series','Depends on sport/competition level'],

      // Circulation
      ['Circulation','Corridor / passageway','80&ndash;160','25','AS/NZS 1680.1 Table 3.1','80 lux minimum; 160 for high traffic'],
      ['Circulation','Stairway','80&ndash;160','25','AS/NZS 1680.1','Emergency lighting overlap'],
      ['Circulation','Lift lobby','160&ndash;200','22','AS/NZS 1680.1',''],
      ['Circulation','Toilet / amenities','160','22','AS/NZS 1680.1','Mirror task: 240 lux'],
      ['Circulation','Kitchen (commercial)','500','19','AS/NZS 1680.2.2','Wet-rated luminaires'],
      ['Circulation','Plant room','100&ndash;160','&mdash;','AS/NZS 1680.1','Locate at eye level near switchgear'],

      // Car Park
      ['Car Park','Covered car park &mdash; day','80','&mdash;','AS/NZS 1680.2.1, AS 1158.3.1','Check transition zone (ramp entry)'],

      // Residential
      ['Residential','Living room','160&ndash;300','22','AS/NZS 1680.1','Flexible / dimmable'],
      ['Residential','Kitchen','240&ndash;320','22','AS/NZS 1680.1','Task: 500 lux on benchtop'],
      ['Residential','Bedroom','100&ndash;200','22','AS/NZS 1680.1','Reading task: 300 lux'],
      ['Residential','Bathroom','160&ndash;240','22','AS/NZS 1680.1','Mirror task: 300 lux'],
      ['Residential','Garage','100','&mdash;','AS/NZS 1680.1',''],

      // Outdoor
      ['Outdoor','Building entrance','100&ndash;200','&mdash;','AS/NZS 1158','Security + wayfinding'],
      ['Outdoor','Pedestrian pathways','20&ndash;50','&mdash;','AS/NZS 1158.3.1',''],
      ['Outdoor','Security lighting','20&ndash;50','&mdash;','AS/NZS 1158','Spill light limits per AS 4282'],
      ['Outdoor','Sports &mdash; training','200&ndash;300','&mdash;','AS 2560 series',''],
      ['Outdoor','Sports &mdash; competition','500+','&mdash;','AS 2560 series','TV broadcast: 1000+ lux'],

      // Hospitality
      ['Hospitality','Hotel room','100&ndash;200','22','AS/NZS 1680.1','Bedside task: 300; dimmable'],
      ['Hospitality','Hotel lobby','200&ndash;300','22','AS/NZS 1680.1','Feature lighting important'],
      ['Hospitality','Restaurant &mdash; fine dining','100&ndash;200','19','AS/NZS 1680.1','Candle-lit ambiance; warm CCT'],
      ['Hospitality','Restaurant &mdash; fast food','300&ndash;500','22','AS/NZS 1680.1',''],
      ['Hospitality','Function room','200&ndash;300','19','AS/NZS 1680.1','Dimmable essential'],
    ];

    function buildTable(data) {
      const body = document.getElementById('luxBody');
      body.innerHTML = '';
      data.forEach(row => {
        const tr = document.createElement('tr');
        const badgeClass = row[4].includes('NCC') ? 'badge-ncc' : 'badge-1680';
        tr.innerHTML = `<td>${row[0]}</td><td>${row[1]}</td><td><strong>${row[2]}</strong></td><td>${row[3]}</td><td><span class="badge badge-1680">${row[4]}</span></td><td>${row[5]}</td>`;
        body.appendChild(tr);
      });
      document.getElementById('countLabel').textContent = `Showing ${data.length} of ${luxData.length} entries`;
    }

    function filterTable() {
      const q = document.getElementById('searchBox').value.toLowerCase();
      const cat = document.getElementById('filterCat').value;
      const filtered = luxData.filter(row => {
        const matchCat = !cat || row[0] === cat;
        const matchSearch = !q || row.join(' ').toLowerCase().includes(q);
        return matchCat && matchSearch;
      });
      buildTable(filtered);
    }

    buildTable(luxData);
    function exportLuxTable() {
      var tbl = document.getElementById('luxTable');
      if (tbl) OmniExport.tableToCSV(tbl, 'lux-levels');
    }
  </script>
  <script src="omni-utils.js"></script></body>
</html>
