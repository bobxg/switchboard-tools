<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AS/NZS 3000 Viewer - OMNI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { margin: 0; overflow: hidden; }
    .viewer-wrap { display: flex; height: calc(100vh - 51px); }

    /* ── Sidebar ── */
    .as-sidebar {
      width: 290px; min-width: 180px;
      background: var(--bg-input);
      border-right: 2px solid var(--border-light);
      display: flex; flex-direction: column;
      overflow: hidden; resize: horizontal;
    }
    .as-sidebar-header {
      padding: 12px 14px 8px; background: var(--bg-table-header); flex-shrink: 0;
    }
    .as-sidebar-header h2 { margin: 0 0 8px; font-size: 1.05em; color: #fff; }
    #tocSearch {
      width: 100%; box-sizing: border-box; padding: 6px 10px;
      border: 1px solid var(--accent-light); border-radius: 4px;
      font-size: 0.92em; background: var(--bg-input); color: var(--text-primary); outline: none;
    }
    #tocSearch:focus { border-color: var(--accent); }

    .toc-tree { flex: 1; overflow-y: auto; padding: 4px 0 16px; }
    .toc-tree::-webkit-scrollbar { width: 6px; }
    .toc-tree::-webkit-scrollbar-thumb { background: var(--text-secondary); border-radius: 3px; }

    .toc-section { margin: 0; }
    .toc-section-title {
      font-weight: bold; font-size: 0.84em; padding: 7px 10px 4px;
      color: var(--text-heading); cursor: pointer;
      display: flex; align-items: flex-start; gap: 5px;
      user-select: none; background: none; border: none;
      width: 100%; text-align: left; font-family: inherit; line-height: 1.35;
    }
    .toc-section-title:hover { background: var(--bg-info); }
    .toc-section-title .arrow {
      display: inline-block; transition: transform 0.18s;
      font-size: 0.75em; flex-shrink: 0; margin-top: 2px;
    }
    .toc-section-title.collapsed .arrow { transform: rotate(-90deg); }

    .toc-clauses { list-style: none; margin: 0; padding: 0 0 4px 12px; }
    .toc-clauses.hidden { display: none; }

    .cl-row {
      display: flex; align-items: center; gap: 3px;
      padding: 1px 4px 1px 2px; border-radius: 3px;
    }
    .cl-row:hover { background: var(--bg-info); }
    .cl-row.active { background: var(--accent); }
    .cl-row.active .cl-btn { color: #fff; }
    .cl-row.active .cl-badge { color: rgba(255,255,255,0.75); border-color: rgba(255,255,255,0.35); }

    .cl-btn {
      flex: 1; text-align: left; font-family: inherit; font-size: 0.83em;
      color: var(--accent); background: none; border: none;
      cursor: pointer; padding: 3px 4px; line-height: 1.4;
    }
    .cl-badge {
      font-size: 0.7em; min-width: 28px; text-align: center;
      padding: 1px 4px; border-radius: 3px; flex-shrink: 0;
      color: var(--text-secondary); border: 1px dashed var(--border-input);
      cursor: pointer; white-space: nowrap;
    }
    .cl-badge { border-style: solid; border-color: #22c55e; color: #15803d; font-weight: 600; }
    .cl-badge:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Main ── */
    .as-content { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    .as-toolbar {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; background: var(--bg-input);
      border-bottom: 1px solid var(--border-light);
      font-size: 0.88em; flex-wrap: wrap; flex-shrink: 0;
    }
    .sep { color: var(--border-input); user-select: none; padding: 0 2px; }
    .tb-label { color: var(--text-secondary); }
    .tb-input {
      padding: 3px 7px; border: 1px solid var(--border-input); border-radius: 4px;
      background: var(--bg-input); color: var(--text-primary); font-size: 0.92em; outline: none;
    }
    .tb-input:focus { border-color: var(--accent); }
    .tb-btn {
      padding: 3px 9px; background: var(--bg-table-header); color: #fff;
      border: none; border-radius: 4px; cursor: pointer; font-size: 0.88em;
    }
    .tb-btn:hover { background: var(--accent); }
    #pageInput { width: 48px; text-align: center; }
    #statusMsg { color: var(--text-secondary); font-style: italic; font-size: 0.83em; }
    #statusMsg.ok { color: #15803d; font-style: normal; }
    #statusMsg.busy { color: var(--accent); font-style: normal; }

    /* ── HTML viewer iframe ── */
    .pdf-wrap { flex: 1; position: relative; }
    #pdfFrame { width: 100%; height: 100%; border: none; display: block; }

    /* Toast */
    #toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #1e293b; color: #fff; padding: 8px 18px;
      border-radius: 20px; font-size: 0.87em;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s, transform 0.2s; z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="top-tabs"></div>
  <div class="viewer-wrap">

    <!-- Sidebar -->
    <div class="as-sidebar">
      <div class="as-sidebar-header">
        <h2>AS/NZS 3000:2018</h2>
        <input type="text" id="tocSearch" placeholder="Search clauses…" autocomplete="off" />
      </div>
      <div class="toc-tree" id="tocTree"></div>
    </div>

    <!-- Main -->
    <div class="as-content">
      <div class="as-toolbar">
        <span class="tb-label">Page</span>
        <input type="number" id="pageInput" class="tb-input" min="1" value="1" />
        <button id="btnGo" class="tb-btn">Go</button>
        <span class="sep">|</span>
        <span class="tb-label" style="font-size:0.82em;">Use Ctrl+F to search in document</span>
        <span class="sep">|</span>
        <span id="statusMsg">Loading…</span>
      </div>

      <div class="pdf-wrap">
        <iframe id="pdfFrame" src="AS3000/AS3000-2018-Clean-Purple-cover.html"
                title="AS/NZS 3000:2018 Wiring Rules"></iframe>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
  (function () {
    'use strict';

    const HTML_URL = 'AS3000/AS3000-2018-Clean-Purple-cover.html';

    const frame     = document.getElementById('pdfFrame');
    const pageInput = document.getElementById('pageInput');
    const statusMsg = document.getElementById('statusMsg');

    /* Exact physical page numbers from the official AS3000:2018 TOC.
       Physical page = document page + 3 (3-page front matter offset). */
    const EXACT_PAGES = {
      // Section 1 (pf24=doc33; gaps at doc39-44, 55-60, 71-76)
      '1.1':24, '1.2':25, '1.3':26, '1.4':26, '1.5':40,
      '1.6':46, '1.7':49, '1.8':49, '1.9':49,
      // Section 2 (gaps at doc87-92, 103-8, 119-24, 135-40)
      '2.1':50, '2.2':52, '2.3':53, '2.4':60, '2.5':60,
      '2.6':80, '2.7':86, '2.8':87, '2.9':88, '2.10':90,
      // Section 3 (pf98=doc149; doc151-252 absent → all point to pf100=doc253)
      '3.1':98, '3.2':98, '3.3':99,
      '3.4':100,'3.5':100,'3.6':100,'3.7':100,'3.8':100,
      '3.9':100,'3.10':100,'3.11':100,'3.12':100,'3.13':100,
      '3.14':100,'3.15':100,'3.16':100,
      // Section 4 (doc212-252 absent → pf100; doc253+=pf100-109)
      '4.1':100,'4.2':100,'4.3':100,'4.4':100,'4.5':100,
      '4.6':100,'4.7':100,'4.8':100,'4.9':100,'4.11':100,
      '4.12':100,'4.13':100,'4.14':103,'4.15':104,'4.16':107,
      '4.17':107,'4.18':107,'4.19':110,'4.20':110,
      // Section 5 (gaps at doc263-68, 279-84, 295-300, 311-16)
      '5.1':110,'5.2':112,'5.3':113,'5.4':120,'5.5':124,
      '5.6':132,'5.7':140,'5.8':140,
      // Section 6 (gaps at doc327-32, 343-48, 359-64)
      '6.1':140,'6.2':140,'6.3':153,'6.4':160,'6.5':165,'6.6':169,'6.7':170,
      // Section 7 (gaps at doc375-80, 391-96; doc407-508 absent → pf199)
      '7.1':170,'7.2':170,'7.3':183,'7.4':190,'7.5':195,
      '7.6':199,'7.7':199,'7.8':199,'7.9':199,
      // Section 8 (doc416-429 absent from HTML → pf199=doc406 nearest)
      '8.1':199,'8.2':199,'8.3':199,'8.4':199
    };

    /* Resolve a clause (including sub-clauses) to a page number.
       Falls back to progressively shorter parent clauses if exact match not found. */
    function lookupClause(cl) {
      if (EXACT_PAGES[cl]) return EXACT_PAGES[cl];
      var parts = cl.split('.');
      while (parts.length > 1) {
        parts.pop();
        var parent = parts.join('.');
        if (EXACT_PAGES[parent]) return EXACT_PAGES[parent];
      }
      return null;
    }

    /* ── TOC data ── */
    const TOC = [
      { sec:1, title:'SCOPE, APPLICATION AND FUNDAMENTAL PRINCIPLES', clauses:[
        {cl:'1.1',t:'Scope'},{cl:'1.2',t:'Application'},{cl:'1.3',t:'Referenced documents'},
        {cl:'1.4',t:'Definitions'},{cl:'1.5',t:'Fundamental principles'},
        {cl:'1.6',t:'Design of an electrical installation'},
        {cl:'1.7',t:'Selection and installation of electrical equipment'},
        {cl:'1.8',t:'Verification (inspection and testing)'},{cl:'1.9',t:'Means of compliance'}
      ]},
      { sec:2, title:'GENERAL ARRANGEMENT, CONTROL AND PROTECTION', clauses:[
        {cl:'2.1',t:'General'},{cl:'2.2',t:'Arrangement of electrical installation'},
        {cl:'2.3',t:'Control of electrical installation'},{cl:'2.4',t:'Fault protection'},
        {cl:'2.5',t:'Protection against overcurrent'},
        {cl:'2.6',t:'Additional protection by residual current devices'},
        {cl:'2.7',t:'Protection against overvoltage'},{cl:'2.8',t:'Protection against undervoltage'},
        {cl:'2.9',t:'Protection against fire hazard due to arcing faults'},{cl:'2.10',t:'Switchboards'}
      ]},
      { sec:3, title:'SELECTION AND INSTALLATION OF WIRING SYSTEMS', clauses:[
        {cl:'3.1',t:'General'},{cl:'3.2',t:'Types of wiring systems'},
        {cl:'3.3',t:'External influences'},{cl:'3.4',t:'Current-carrying capacity'},
        {cl:'3.5',t:'Conductor size'},{cl:'3.6',t:'Voltage drop'},
        {cl:'3.7',t:'Electrical connections'},{cl:'3.8',t:'Identification'},
        {cl:'3.9',t:'Installation requirements'},{cl:'3.10',t:'Enclosure of cables'},
        {cl:'3.11',t:'Underground wiring systems'},{cl:'3.12',t:'Aerial wiring systems'},
        {cl:'3.13',t:'Cables supported by a catenary'},{cl:'3.14',t:'Safety services'},
        {cl:'3.15',t:'Busways, including rising mains systems'},{cl:'3.16',t:'Earth sheath return (ESR) system'}
      ]},
      { sec:4, title:'SELECTION AND INSTALLATION OF ELECTRICAL EQUIPMENT', clauses:[
        {cl:'4.1',t:'General'},{cl:'4.2',t:'Protection against thermal effects'},
        {cl:'4.3',t:'Connection of electrical equipment'},{cl:'4.4',t:'Socket-outlets'},
        {cl:'4.5',t:'Lighting equipment and accessories'},{cl:'4.6',t:'Smoke alarms'},
        {cl:'4.7',t:'Cooking appliances'},{cl:'4.8',t:'Appliances producing hot water or steam'},
        {cl:'4.9',t:'Room heaters'},{cl:'4.11',t:'Electric duct heaters'},
        {cl:'4.12',t:'Electricity converters'},{cl:'4.13',t:'Motors'},{cl:'4.14',t:'Transformers'},
        {cl:'4.15',t:'Capacitors'},{cl:'4.16',t:'Electrical equipment containing liquid dielectrics'},
        {cl:'4.17',t:'Batteries'},{cl:'4.18',t:'Gas appliances and equipment'},
        {cl:'4.19',t:'Airconditioning and heat pump systems'},{cl:'4.20',t:'Lifts'}
      ]},
      { sec:5, title:'EARTHING ARRANGEMENTS AND EQUIPOTENTIAL BONDING', clauses:[
        {cl:'5.1',t:'General'},{cl:'5.2',t:'Earthing functions'},{cl:'5.3',t:'Earthing system parts'},
        {cl:'5.4',t:'Earthing of equipment'},{cl:'5.5',t:'Earthing arrangements'},
        {cl:'5.6',t:'Equipotential bonding'},{cl:'5.7',t:'Earth fault-loop impedance'},
        {cl:'5.8',t:'Other earthing arrangements'}
      ]},
      { sec:6, title:'DAMP SITUATIONS, WATER HEATERS AND SWIMMING POOLS', clauses:[
        {cl:'6.1',t:'General'},{cl:'6.2',t:'Baths, showers and other fixed water containers'},
        {cl:'6.4',t:'Fountains and water features'},{cl:'6.5',t:'Saunas'},
        {cl:'6.6',t:'Refrigeration rooms'},{cl:'6.7',t:'Sanitization and general hosing-down operations'}
      ]},
      { sec:7, title:'SPECIAL ELECTRICAL INSTALLATIONS', clauses:[
        {cl:'7.1',t:'General'},{cl:'7.2',t:'Safety services'},
        {cl:'7.3',t:'Electricity generation systems'},
        {cl:'7.5',t:'Extra-low voltage electrical installations'},
        {cl:'7.6',t:'High voltage electrical installations'},
        {cl:'7.8',t:'Standards for specific electrical installations'},
        {cl:'7.9',t:'Supplies for electric vehicles (NZ only)'}
      ]},
      { sec:8, title:'VERIFICATION', clauses:[
        {cl:'8.1',t:'General'},{cl:'8.2',t:'Visual inspection'},
        {cl:'8.3',t:'Testing'},{cl:'8.4',t:'Verification records'}
      ]}
    ];

    /* ── Build sidebar ── */
    var tree = document.getElementById('tocTree');
    TOC.forEach(function (section) {
      var div = document.createElement('div');
      div.className = 'toc-section';

      var btn = document.createElement('button');
      btn.className = 'toc-section-title collapsed';
      btn.innerHTML = '<span class="arrow">&#9660;</span>&ensp;Section ' +
                      section.sec + ' &mdash; ' + section.title;
      var ul = document.createElement('ul');
      ul.className = 'toc-clauses hidden';
      btn.addEventListener('click', function () {
        btn.classList.toggle('collapsed');
        ul.classList.toggle('hidden');
      });

      section.clauses.forEach(function (c) {
        var li  = document.createElement('li');
        var row = document.createElement('div');
        row.className = 'cl-row';
        row.dataset.cl = c.cl;

        var clBtn = document.createElement('button');
        clBtn.className = 'cl-btn';
        clBtn.textContent = c.cl + '\u2002' + c.t;

        var badge = document.createElement('span');
        badge.className = 'cl-badge exact';
        badge.dataset.cl = c.cl;
        badge.title = 'Click to navigate to page ' + (EXACT_PAGES[c.cl] || '?');
        badge.textContent = EXACT_PAGES[c.cl] ? 'p' + EXACT_PAGES[c.cl] : '?';

        clBtn.addEventListener('click', function () { tocNav(c.cl, row); });
        badge.addEventListener('click', function () { tocNav(c.cl, row); });

        row.appendChild(clBtn);
        row.appendChild(badge);
        li.appendChild(row);
        ul.appendChild(li);
      });

      div.appendChild(btn);
      div.appendChild(ul);
      tree.appendChild(div);
    });

    /* ── Navigation state ── */
    var iframeReady = false;
    var pendingPageId = null;

    /* ── Navigate the iframe to a specific page number ── */
    function goToPage(page) {
      page = parseInt(page, 10);
      if (!page || page < 1) return;
      pageInput.value = page;
      var targetId = 'pf' + page;
      if (iframeReady) {
        navigateToPage(targetId);
      } else {
        pendingPageId = targetId; /* queued — will fire in load handler */
      }
    }

    /* Scroll the pdf2htmlEX #page-container to the target page and flash it */
    function navigateToPage(targetId) {
      try {
        var win = frame.contentWindow;
        var doc = win.document;
        var el  = doc.getElementById(targetId);
        if (!el) { showToast('Page not found: ' + targetId); return; }

        /* pdf2htmlEX uses #page-container as the scrollable viewport */
        var pc = doc.getElementById('page-container');
        if (pc) {
          var newTop = pc.scrollTop +
                       el.getBoundingClientRect().top -
                       pc.getBoundingClientRect().top;
          pc.scrollTo ? pc.scrollTo({ top: newTop, behavior: 'smooth' })
                       : (pc.scrollTop = newTop);
        } else {
          el.scrollIntoView({ block: 'start', behavior: 'smooth' });
        }

        flashPage(el, doc);
        return;
      } catch (e) { /* cross-origin or structural change — fall through */ }

      /* Fallback: reload iframe with anchor hash */
      iframeReady  = false;
      pendingPageId = targetId;
      frame.src    = HTML_URL + '#' + targetId;
    }

    /* Inject flash CSS once, then animate the page element yellow */
    function flashPage(el, doc) {
      if (!doc.getElementById('omni-flash-css')) {
        var s = doc.createElement('style');
        s.id   = 'omni-flash-css';
        s.textContent =
          '@keyframes omniFlash{' +
          '  0%  {box-shadow:inset 0 0 0 8px rgba(253,224,71,1),0 0 60px 20px rgba(253,224,71,.65)}' +
          '  55% {box-shadow:inset 0 0 0 5px rgba(253,224,71,.9),0 0 35px 10px rgba(253,224,71,.35)}' +
          '  100%{box-shadow:none}' +
          '}' +
          '.omni-flash{animation:omniFlash 2s ease-out forwards}';
        doc.head.appendChild(s);
      }
      el.classList.remove('omni-flash');
      void el.offsetWidth;           /* force reflow so animation restarts */
      el.classList.add('omni-flash');
      setTimeout(function () { el.classList.remove('omni-flash'); }, 2100);
    }

    function tocNav(cl, rowEl) {
      document.querySelectorAll('.cl-row.active').forEach(function (r) { r.classList.remove('active'); });
      rowEl.classList.add('active');
      rowEl.scrollIntoView({ block: 'nearest' });

      var page = EXACT_PAGES[cl];
      if (!page) {
        showToast('Page unknown for clause ' + cl);
        return;
      }
      goToPage(page);
      setStatus('Clause ' + cl + ' \u2014 page ' + page, 'ok');
    }

    /* ── Toolbar page input ── */
    document.getElementById('btnGo').addEventListener('click', function () {
      goToPage(pageInput.value);
    });
    pageInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') goToPage(this.value);
    });

    /* ── TOC search ── */
    document.getElementById('tocSearch').addEventListener('input', function () {
      var q = this.value.toLowerCase().trim();
      document.querySelectorAll('.toc-section').forEach(function (sec) {
        var sb = sec.querySelector('.toc-section-title');
        var ul = sec.querySelector('.toc-clauses');
        var any = false;
        sec.querySelectorAll('.cl-row').forEach(function (row) {
          var show = !q || row.textContent.toLowerCase().includes(q);
          row.parentElement.style.display = show ? '' : 'none';
          if (show) any = true;
        });
        sec.style.display = any || !q ? '' : 'none';
        if (q && any) { sb.classList.remove('collapsed'); ul.classList.remove('hidden'); }
      });
    });

    /* ── Status helper ── */
    function setStatus(msg, cls) {
      statusMsg.textContent = msg;
      statusMsg.className   = cls || '';
    }

    /* ── Toast ── */
    var toastTmr;
    function showToast(msg) {
      var el = document.getElementById('toast');
      clearTimeout(toastTmr);
      el.textContent = msg;
      el.classList.add('show');
      toastTmr = setTimeout(function () { el.classList.remove('show'); }, 3000);
    }

    /* ── Handle inbound #cl-X.X hash (from other pages linking to a clause) ── */
    function parseInboundHash() {
      var m = window.location.hash.match(/^#cl-(.+)$/);
      if (!m) return;
      var cl   = m[1];
      var page = lookupClause(cl);
      if (page) {
        pendingPageId = 'pf' + page;
        setStatus('Clause ' + cl + ' \u2014 page ' + page, 'ok');
        /* Highlight the closest sidebar row */
        var topCl = cl.split('.').slice(0, 2).join('.');
        document.querySelectorAll('.cl-row').forEach(function (row) {
          if (row.dataset.cl === topCl) {
            row.classList.add('active');
            row.scrollIntoView({ block: 'nearest' });
          }
        });
      } else {
        showToast('Clause ' + cl + ' not found in page map');
      }
    }

    /* ── Start ── */
    frame.addEventListener('load', function () {
      iframeReady = true;
      setStatus('Document ready \u2014 click a clause to navigate', 'ok');

      /* Resolve inbound hash on first load */
      parseInboundHash();

      /* Execute any queued navigation */
      if (pendingPageId) {
        var pid = pendingPageId;
        pendingPageId = null;
        setTimeout(function () { navigateToPage(pid); }, 200);
      }
    });

    setStatus('Loading AS/NZS 3000:2018\u2026', 'busy');

  })();
  </script>
  <script src="omni-utils.js"></script>
</body>
</html>
